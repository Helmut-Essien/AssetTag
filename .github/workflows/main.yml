name: Smart Deployment with Migrations (WebDeploy)

on:
  push:
    branches: [ master ]
    paths:
      - 'AssetTag/**'
      - 'Portal/**'
      - 'Shared/**'
      - 'MobileApp/**'
      - 'MobileData/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'
  SOLUTION_PATH: 'AssetTag.sln'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.filter.outputs.api }}
      portal-changed: ${{ steps.filter.outputs.portal }}
      mobile-changed: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect project changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'AssetTag/**'
              - 'Shared/**'
              - '.github/workflows/**'
            portal:
              - 'Portal/**'
              - 'Shared/**'
              - '.github/workflows/**'
            mobile:
              - 'MobileApp/**'
              - 'MobileData/**'
              - 'Shared/**'
              - '.github/workflows/**'

  build-and-publish:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.api-changed == 'true' || needs.detect-changes.outputs.portal-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          workloads: maui-android

      - name: Restore dependencies
        #run: dotnet restore ${{ env.SOLUTION_PATH }}
        run: |
          dotnet restore AssetTag/AssetTag.csproj
          dotnet restore Portal/Portal.csproj

      - name: Create publish directories
        run: |
          mkdir -p ./publish/api
          mkdir -p ./publish/portal

      - name: Build and Publish API (if changed)
        if: needs.detect-changes.outputs.api-changed == 'true'
        env:
          CONN: ${{ secrets.MONSTERASP_DATABASE_CONNECTION }}
          JWT: ${{ secrets.JWT_SECURITY_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}
          APIKey: ${{ secrets.API_KEY }}
        run: |
          dotnet publish AssetTag/AssetTag.csproj \
            --configuration Release \
            --output ./publish/api \
            -p:UseAppHost=false \
            -p:AspNetCoreHostingModel=OutOfProcess \
            -p:EnvironmentName=Production

          mkdir -p ./publish/api/logs

          cat > ./publish/api/appsettings.Production.json << EOF
          {
            "ConnectionStrings": { "DefaultConnection": "$CONN" },
            "JwtSettings": {
              "SecurityKey": "$JWT",
              "Issuer": "AssetTagApi",
              "Audience": "AssetTagApiClient"
            },
            "EmailSettings": {
              "Username": "$EMAIL_USER",
              "Password": "$EMAIL_PASS"
            },
            "Groq": {
            "ApiKey": "$APIKey"
            },
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            }
          }
          EOF

          cat > ./publish/api/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified"/>
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\AssetTag.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="OutOfProcess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production"/>
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          EOF

      - name: Build and Publish Portal (if changed)
        if: needs.detect-changes.outputs.portal-changed == 'true'
        run: |
          dotnet publish Portal/Portal.csproj \
            --configuration Release \
            --output ./publish/portal \
            -p:UseAppHost=false \
            -p:AspNetCoreHostingModel=OutOfProcess \
            -p:EnvironmentName=Production

          mkdir -p ./publish/portal/logs

          cat > ./publish/portal/appsettings.Production.json << 'EOF'
          {
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            },
            "Api": { "BaseUrl": "http://mugassetapi.runasp.net/" },
            "Dashboard": {
              "EnableCaching": true,
              "CacheDurationMinutes": 5,
              "AutoRefreshIntervalMinutes": 2,
              "ChartAnimation": true,
              "LazyLoading": true
            },
            "Performance": {
              "MaxParallelRequests": 10,
              "RequestTimeoutSeconds": 30
            },
            "AllowedHosts": "*"
          }
          EOF

          cat > ./publish/portal/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified"/>
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\Portal.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="OutOfProcess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production"/>
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          EOF

      - name: Upload API artifact
        if: needs.detect-changes.outputs.api-changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-deployment
          path: ./publish/api/

      - name: Upload Portal artifact
        if: needs.detect-changes.outputs.portal-changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: portal-deployment
          path: ./publish/portal/

  run-migrations:
    needs: [detect-changes, build-and-publish]
    if: needs.detect-changes.outputs.api-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore & Run EF Migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.MONSTERASP_DATABASE_CONNECTION }}
        run: |
          dotnet tool install --global dotnet-ef --version 9.*
          dotnet ef database update \
            --project AssetTag/AssetTag.csproj \
            --startup-project AssetTag/AssetTag.csproj \
            --configuration Release
          echo "Database migrations applied successfully"

  # ========================================
  # DEPLOY API VIA WEB DEPLOY
  # ========================================
  deploy-api:
    needs: [detect-changes, build-and-publish, run-migrations]
    if: needs.detect-changes.outputs.api-changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-deployment
          path: api-deployment

      - name: Create DataProtection Keys folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "api-deployment/App_Data/Keys"

      - name: Deploy API using Web Deploy
        uses: ChristopheLav/iis-deploy@v1
        with:
          website-name: ${{ secrets.API_WEBSITE_NAME }}
          msdeploy-service-url: ${{ secrets.API_DEPLOY_URL }}
          msdeploy-username: ${{ secrets.API_USERNAME }}
          msdeploy-password: ${{ secrets.API_USERPASSWORD }}
          source-path: api-deployment
          skip-extra-files: false   # deletes old files not in new publish (clean slate)
          enable-app-offline: true  # automatically handles app_offline.htm + graceful shutdown

  # ========================================
  # DEPLOY PORTAL VIA WEB DEPLOY
  # ========================================
  deploy-portal:
    needs: [detect-changes, build-and-publish]
    if: needs.detect-changes.outputs.portal-changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Download Portal artifact
        uses: actions/download-artifact@v4
        with:
          name: portal-deployment
          path: portal-deployment

      - name: Create DataProtection Keys folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "portal-deployment/App_Data/Keys"

      - name: Deploy Portal using Web Deploy
        uses: ChristopheLav/iis-deploy@v1
        with:
          website-name: ${{ secrets.PORTAL_WEBSITE_NAME }}
          msdeploy-service-url: ${{ secrets.PORTAL_DEPLOY_URL }}
          msdeploy-username: ${{ secrets.PORTAL_USERNAME }}
          msdeploy-password: ${{ secrets.PORTAL_USERPASSWORD }}
          source-path: portal-deployment
          skip-extra-files: false
          enable-app-offline: true

      - name: Portal deployed successfully
        run: echo "Portal is now live!"

  # ========================================
  # BUILD ANDROID APK
  # ========================================
  build-android:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Android SDK toolchain requires JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Install the MAUI Android workload on the Linux runner
      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # Cache NuGet packages — keyed on all .csproj files so cache busts
      # whenever any dependency version changes. Saves several minutes per run.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Decode the base64 keystore secret back into a .jks file on disk
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > mugassets.keystore

      # Restore with android framework scoped to MobileApp only.
      # MobileData and Shared restore for their own net9.0 target naturally.
      # Note: dotnet restore does not support -f shorthand; use -p:TargetFramework instead.
      - name: Restore (Android only)
        run: dotnet restore MobileApp/MobileApp.csproj -p:TargetFramework=net9.0-android

      # --no-restore skips the inline restore so the cascading TargetFrameworks
      # issue cannot occur; assets from the step above are reused.
      - name: Build & sign Android APK
        run: |
          dotnet publish MobileApp/MobileApp.csproj \
            -f net9.0-android \
            -c Release \
            --no-restore \
            -p:AndroidSigningKeyStore=${{ github.workspace }}/mugassets.keystore \
            -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:ApplicationDisplayVersion="1.0.${{ github.run_number }}" \
            --output ./publish/android

      # Find the signed APK specifically — MAUI names it *-Signed.apk.
      # This avoids accidentally picking up an unsigned or debug APK.
      - name: Rename APK
        run: |
          APK_FILE=$(find ./publish/android -name "*-Signed.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No signed APK found. Build output:";
            find ./publish/android -type f; exit 1;
          fi
          echo "Found signed APK: $APK_FILE"
          cp "$APK_FILE" "./MUGAssets-v1.0.${{ github.run_number }}.apk"

      # Upload the renamed APK as a workflow artifact for the next job
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./MUGAssets-v1.0.${{ github.run_number }}.apk

  # ========================================
  # PUBLISH APK TO GITHUB RELEASES
  # ========================================
  release-android:
    needs: [detect-changes, build-android]
    if: needs.detect-changes.outputs.mobile-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./apk-release

      # Creates a versioned GitHub Release and attaches the APK as a downloadable asset
      # Users can sideload directly by downloading from the Releases page
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v1.0.${{ github.run_number }}
          name: "MUG Assets v1.0.${{ github.run_number }}"
          body: |
            ## MUG Assets Android Release

            **Version:** 1.0.${{ github.run_number }}
            **Built from:** ${{ github.sha }}

            ### How to install (sideloading)
            1. Download `MUGAssets-v1.0.${{ github.run_number }}.apk` below
            2. Transfer to your Android device
            3. On the device: **Settings → Apps → Special app access → Install unknown apps**
            4. Enable installs from your file manager or browser, then open the APK
          files: ./apk-release/MUGAssets-v1.0.${{ github.run_number }}.apk
          make_latest: false
          generate_release_notes: false
